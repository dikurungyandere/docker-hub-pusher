name: Build and Push to Docker Hub

on:
  workflow_dispatch:
    inputs:
      git_repository:
        description: 'Public Git repository URL to clone and build'
        required: true
        type: string
      branch:
        description: 'Branch to build (leave empty to use the repository default branch)'
        required: false
        default: ''
        type: string
      dockerhub_repository:
        description: 'Docker Hub repository to push to (e.g. username/myimage)'
        required: true
        type: string
      dockerhub_username:
        description: 'Docker Hub username'
        required: true
        type: string
      image_tag:
        description: 'Image tag (defaults to "latest")'
        required: false
        default: 'latest'
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: {}  # No GitHub token permissions needed

    steps:
      - name: Clone the target repository
        env:
          GIT_REPO: ${{ inputs.git_repository }}
          GIT_BRANCH: ${{ inputs.branch }}
        run: |
          if [ -n "$GIT_BRANCH" ]; then
            git clone --branch "$GIT_BRANCH" --depth 1 "$GIT_REPO" target-repo
          else
            git clone --depth 1 "$GIT_REPO" target-repo
          fi

      - name: Show current commit of cloned repository
        run: git -C target-repo rev-parse HEAD

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./target-repo
          push: true
          tags: ${{ inputs.dockerhub_repository }}:${{ inputs.image_tag }}
