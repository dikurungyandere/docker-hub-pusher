name: Build and Push to GitHub Packages (GHCR)

on:
  workflow_dispatch:
    inputs:
      git_repository:
        description: 'Public Git repository URL to clone and build'
        required: true
        type: string
      branch:
        description: 'Branch to build (leave empty to use the repository default branch)'
        required: false
        default: ''
        type: string
      image_name:
        description: 'Image name to publish on GHCR (e.g. myimage). Will be pushed as ghcr.io/<your-github-username>/<image_name>'
        required: true
        type: string
      image_tag:
        description: 'Image tag (defaults to "latest")'
        required: false
        default: 'latest'
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to access repository contents
      packages: write  # Required to push to GitHub Container Registry

    steps:
      - name: Clone the target repository
        env:
          GIT_REPO: ${{ inputs.git_repository }}
          GIT_BRANCH: ${{ inputs.branch }}
        run: |
          if [ -n "$GIT_BRANCH" ]; then
            git clone --branch "$GIT_BRANCH" --depth 1 "$GIT_REPO" target-repo
          else
            git clone --depth 1 "$GIT_REPO" target-repo
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./target-repo
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
